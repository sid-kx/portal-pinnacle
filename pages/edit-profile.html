<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Edit Profile | Pinnacle Realty Portal</title>
  <link rel="stylesheet" href="../styles.css" />
</head>

<body data-protected="agent">
  <div class="portal-bg">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>
    <div class="glow glow-three"></div>
  </div>

  <section class="portal-app active">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <img src="../assets/images/pinnacle-logo.png" alt="Pinnacle Realty Logo" />
      </div>

      <nav class="sidebar-nav active">
        <a class="nav-link" href="agent-dashboard.html">Dashboard</a>
        <a class="nav-link active" href="edit-profile.html">Edit Profile</a>
      </nav>

      <div class="sidebar-footer">
        <button class="logout-btn" data-logout>Logout</button>
      </div>
    </aside>

    <div class="main-shell">
      <header class="topbar">
        <button class="mobile-menu-btn" id="mobileMenuBtn">☰</button>

        <div>
          <p class="page-label">Agent Portal</p>
          <h2>Edit Profile</h2>
        </div>

        <div class="profile-pill">
          <div class="profile-avatar">S</div>
          <div>
            <strong>Sid Kamboj</strong>
            <span>Agent Account</span>
          </div>
        </div>
      </header>

      <main class="content-area">
        <section class="section-heading">
          <p class="eyebrow">Agent Profile</p>
          <h1>Edit public profile</h1>
          <p>These fields control what visitors will see on the public agents page.</p>
        </section>

        <form class="profile-form" id="profileForm">
          <div class="form-card image-card">
            <div class="upload-preview">SK</div>
            <div>
              <h3>Profile Image</h3>
              <p>Upload a professional headshot. This will later connect to Supabase Storage.</p>
              <input type="file" id="profileImage" name="profile_image" accept="image/*" />
            </div>
          </div>

          <div class="form-grid">
            <label>
              Full Name
              <input type="text" id="profileName" name="full_name" placeholder="Full name" required />
            </label>

            <label>
              Email
              <input type="email" id="profileEmail" name="email" placeholder="email@pinnaclerealty.ca" required />
            </label>

            <label>
              Direct Phone
              <input type="tel" id="profilePhone" name="direct_phone" placeholder="905-000-0000" />
            </label>

            <label>
              Office Phone
              <input type="tel" id="profileOfficePhone" name="office_phone" placeholder="905-609-7653" />
            </label>
          </div>

          <label class="full-field">
            Biography
            <textarea id="profileBio" name="bio" rows="8" placeholder="Write your professional biography..."></textarea>
          </label>

          <div class="form-grid">
            <label>
              Instagram URL
              <input type="url" id="profileInstagram" name="instagram_url" placeholder="https://instagram.com/..." />
            </label>

            <label>
              Facebook URL
              <input type="url" id="profileFacebook" name="facebook_url" placeholder="https://facebook.com/..." />
            </label>

            <label>
              LinkedIn URL
              <input type="url" id="profileLinkedin" name="linkedin_url" placeholder="https://linkedin.com/in/..." />
            </label>

            <label>
              X / Twitter URL
              <input type="url" id="profileTwitter" name="twitter_url" placeholder="https://x.com/..." />
            </label>

            <label>
              YouTube URL
              <input type="url" id="profileYoutube" name="youtube_url" placeholder="https://youtube.com/..." />
            </label>
          </div>

          <input type="hidden" id="profileStatus" name="profile_status" value="active" />
          <input type="hidden" id="profilePublicStatus" name="is_public" value="true" />

          <div class="form-actions">
            <a href="agent-dashboard.html" class="ghost-btn">Cancel</a>
            <button type="submit" class="primary-btn">Save Changes</button>
          </div>

          <p class="form-message" id="profileMessage"></p>
        </form>
      </main>
    </div>
  </section>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <script src="../script.js"></script>
</body>
</html>
