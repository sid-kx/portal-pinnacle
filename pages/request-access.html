<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Request Access | Pinnacle Realty Portal</title>
  <link rel="stylesheet" href="../styles.css" />
</head>

<body data-page="request-access">
  <div class="portal-bg">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>
    <div class="glow glow-three"></div>
  </div>

  <main class="login-screen active">
    <section class="login-card single-card">
      <div class="brand-area">
        <img src="../assets/images/pinnacle-logo.png" alt="Pinnacle Realty Logo" class="brand-logo" />
        <p class="brand-kicker">Agent Access Request</p>
        <h1>Request access to the Pinnacle portal.</h1>
        <p class="brand-subtext">
          New agents can submit their information here. The Broker of Record must approve the account before access is granted and before the profile appears publicly.
        </p>
      </div>

      <form class="login-form" id="requestAccessForm">
        <label for="requestName">Full Name</label>
        <input type="text" id="requestName" name="full_name" placeholder="Your full name" required />

        <label for="requestEmail">Email Address</label>
        <input type="email" id="requestEmail" name="email" placeholder="your@email.com" required />

        <label for="requestPhone">Phone Number</label>
        <input type="tel" id="requestPhone" name="phone" placeholder="905-000-0000" required />

        <label for="requestLicense">RECO / License Number</label>
        <input type="text" id="requestLicense" name="license_number" placeholder="Optional for backend record" />

        <label for="requestPassword">Choose Password</label>
        <input type="password" id="requestPassword" name="password" placeholder="Minimum 8 characters" required minlength="8" />

        <input type="hidden" id="requestRole" name="role" value="agent" />
        <input type="hidden" id="requestStatus" name="status" value="pending" />
        <input type="hidden" id="requestPublicStatus" name="is_public" value="false" />

        <button type="submit" class="primary-btn">Submit Request</button>

        <div class="login-actions">
          <a href="../index.html">Back to login</a>
        </div>

        <p class="login-note" id="requestMessage"></p>
      </form>
    </section>
  </main>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../supabase-config.js"></script>
  <script src="../script.js"></script>
</body>
</html>
